<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#f2f2f7">
    <title>Автоинструктор Pro</title>
    
    <!-- ========== СИСТЕМА ДОСТУПА ЧЕРЕЗ SUPABASE ========== -->
    <script>
    (function() {
        // ========== НАСТРОЙКИ ==========
        const VALIDATE_KEY_URL = 'https://knnmjukotzfhoruvzuvp.supabase.co/functions/v1/validate-key';
        const STORAGE_KEY = 'app_authorized';
        const CODE_KEY = 'app_used_code';
        const DEVICE_KEY = 'app_device_id';
        const EXPIRY_KEY = 'app_expiry';

        // === ГЕНЕРАЦИЯ ID УСТРОЙСТВА ===
        function getDeviceId() {
            let deviceId = localStorage.getItem(DEVICE_KEY);
            if (!deviceId) {
                const salt = 'XyZ2026!@#';
                const components = [
                    navigator.userAgent,
                    screen.width + 'x' + screen.height,
                    navigator.language,
                    new Date().getTimezoneOffset(),
                    navigator.hardwareConcurrency || 0,
                    navigator.deviceMemory || 0
                ];
                const raw = components.join('||') + salt;
                deviceId = btoa(raw).substring(0, 24);
                localStorage.setItem(DEVICE_KEY, deviceId);
            }
            return deviceId;
        }

        // === ПРОВЕРКА КЛЮЧА ЧЕРЕЗ SUPABASE ===
        async function isValidKey(key) {
            if (!key) return false;
            
            try {
                const response = await fetch(VALIDATE_KEY_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ key })
                });
                
                const data = await response.json();
                
                if (data.valid) {
                    if (data.type) {
                        localStorage.setItem('app_key_type', data.type);
                    }
                    return true;
                } else {
                    console.log('❌ Ключ невалиден:', data.error);
                    return false;
                }
            } catch (error) {
                console.error('Ошибка проверки ключа:', error);
                return false;
            }
        }

        // === ГЛАВНАЯ ФУНКЦИЯ ПРОВЕРКИ ДОСТУПА ===
        (async function checkAccess() {
            const savedCode = localStorage.getItem(CODE_KEY);
            const deviceId = getDeviceId();

            // Проверяем сохранённый ключ
            if (savedCode) {
                const isValid = await isValidKey(savedCode);
                if (isValid) {
                    localStorage.setItem(STORAGE_KEY, 'true');
                    showApp();
                    return;
                } else {
                    localStorage.removeItem(STORAGE_KEY);
                    localStorage.removeItem(CODE_KEY);
                    localStorage.removeItem(EXPIRY_KEY);
                    localStorage.removeItem('app_key_type');
                }
            }

            if (localStorage.getItem(STORAGE_KEY) === 'true') {
                localStorage.removeItem(STORAGE_KEY);
                localStorage.removeItem(CODE_KEY);
                localStorage.removeItem(EXPIRY_KEY);
                localStorage.removeItem('app_key_type');
            }

            showLoginForm();
        })();

        // === ПОКАЗАТЬ ПРИЛОЖЕНИЕ ===
        function showApp() {
            const loginContainer = document.getElementById('loginContainer');
            if (loginContainer) {
                loginContainer.remove();
            }
            
            const appContent = document.getElementById('appContent');
            if (appContent) {
                appContent.style.display = 'block';
            }
            
            if (typeof initApp === 'function') {
                initApp();
            }
        }

        // === ПОКАЗАТЬ ФОРМУ ВХОДА (ИСПРАВЛЕННАЯ ВЕРСИЯ) ===
        function showLoginForm() {
            // СКРЫВАЕМ приложение, а не удаляем!
            const appContent = document.getElementById('appContent');
            if (appContent) {
                appContent.style.display = 'none';
            }
            
            // Создаём форму входа поверх всего
            const container = document.createElement('div');
            container.id = 'loginContainer';
            container.className = 'login-container';
            container.innerHTML = `
                <div style="text-align:center; font-size:56px; margin-bottom:8px; animation: pulse 2s ease-in-out infinite;">🚗</div>
                <div style="text-align:center; font-size:24px; font-weight:700; color:#1a1a2e; margin-bottom:4px;">Автоинструктор Pro</div>
                <div style="text-align:center; font-size:15px; color:#8e8e93; margin-bottom:24px;">Введите код доступа</div>
                <div id="loginError" style="background:rgba(255,59,48,0.1); border:1px solid rgba(255,59,48,0.3); border-radius:12px; padding:12px 16px; color:#ff3b30; font-size:14px; font-weight:500; margin-bottom:16px; display:none;">❌ Неверный код. Попробуйте снова.</div>
                <div style="margin-bottom:20px;">
                    <label style="display:block; font-size:13px; font-weight:600; color:#8e8e93; margin-bottom:6px; letter-spacing:0.3px;">Код доступа</label>
                    <div style="position:relative; display:flex; align-items:center; background:#f2f2f7; border-radius:14px; border:2px solid transparent; transition:all 0.3s ease;">
                        <span style="padding:0 14px 0 16px; font-size:18px; opacity:0.5;">🔑</span>
                        <input type="text" id="codeInput" style="width:100%; padding:16px 0; border:none; background:transparent; font-size:17px; outline:none; font-family:inherit; color:#1a1a2e; letter-spacing:1px; text-transform:uppercase;" placeholder="Введите код" autofocus>
                    </div>
                </div>
                <button id="loginBtn" style="width:100%; padding:18px; background:linear-gradient(135deg, #667eea 0%, #764ba2 100%); color:white; border:none; border-radius:14px; font-size:17px; font-weight:600; cursor:pointer; transition:all 0.3s ease; box-shadow:0 4px 15px rgba(102,126,234,0.4); margin-top:4px; min-height:56px;">Активировать доступ</button>
                <div id="attemptsInfo" style="text-align:center; font-size:13px; color:#8e8e93; margin-top:16px; opacity:0.7;"></div>
                <div style="text-align:center; font-size:13px; color:#8e8e93; margin-top:12px; padding:12px; background:rgba(102,126,234,0.05); border-radius:12px; border:1px dashed rgba(102,126,234,0.2);">
                    💡 Код выдаётся администратором<br>
                    <strong style="color:#667eea;">MASTER-</strong> — вечный доступ<br>
                    <strong style="color:#667eea;">DEMO-</strong> — доступ на 24 часа
                </div>
                <div id="keyTypeHint" style="text-align:center; font-size:12px; color:#8e8e93; margin-top:8px; opacity:0.6;"></div>
                <div style="text-align:center; margin-top:20px; font-size:13px; color:#aeaeb2;">Доступ только для <span style="color:#667eea; font-weight:600;">авторизованных</span></div>
                <style>
                    .login-container {
                        background: rgba(255,255,255,0.95);
                        backdrop-filter: blur(20px);
                        border-radius: 24px;
                        padding: 40px 32px;
                        max-width: 400px;
                        width: calc(100% - 32px);
                        box-shadow: 0 20px 60px rgba(0,0,0,0.3);
                        animation: fadeInUp 0.6s ease;
                        position: fixed;
                        top: 50%;
                        left: 50%;
                        transform: translate(-50%, -50%);
                        z-index: 9999;
                    }
                    @keyframes fadeInUp {
                        from { opacity: 0; transform: translate(-50%, -40%) scale(0.95); }
                        to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
                    }
                    @keyframes shake {
                        0%, 100% { transform: translate(-50%, -50%) translateX(0); }
                        25% { transform: translate(-50%, -50%) translateX(-8px); }
                        75% { transform: translate(-50%, -50%) translateX(8px); }
                    }
                    @keyframes pulse {
                        0%, 100% { transform: scale(1); }
                        50% { transform: scale(1.05); }
                    }
                    .login-container input:focus {
                        border-color: #667eea;
                        background: #ffffff;
                        box-shadow: 0 0 0 4px rgba(102,126,234,0.15);
                    }
                    @media (max-width: 480px) {
                        .login-container { padding: 32px 24px; }
                    }
                    @media (prefers-color-scheme: dark) {
                        .login-container { background: rgba(44,44,46,0.95); }
                        .login-container input { color: #ffffff; }
                        .login-container input::placeholder { color: #636366; }
                    }
                </style>
            `;

            document.body.appendChild(container);

            // === ЛОГИКА РАБОТЫ ФОРМЫ ===
            const input = document.getElementById('codeInput');
            const btn = document.getElementById('loginBtn');
            const error = document.getElementById('loginError');
            const attemptsInfo = document.getElementById('attemptsInfo');
            const keyTypeHint = document.getElementById('keyTypeHint');

            let attempts = 0;
            const MAX_ATTEMPTS = 5;

            input.addEventListener('input', function() {
                const val = this.value.trim().toUpperCase();
                if (val.startsWith('MASTER-')) {
                    keyTypeHint.textContent = '👑 Мастер-ключ (вечный доступ)';
                    keyTypeHint.style.color = '#667eea';
                } else if (val.startsWith('DEMO-')) {
                    keyTypeHint.textContent = '⏰ Демо-ключ (24 часа)';
                    keyTypeHint.style.color = '#34c759';
                } else {
                    keyTypeHint.textContent = '';
                }
            });

            function showError(text) {
                error.textContent = text || '❌ Неверный код. Попробуйте снова.';
                error.style.display = 'block';
                error.style.animation = 'shake 0.4s ease';
                setTimeout(() => {
                    error.style.display = 'none';
                }, 3000);
            }

            function updateAttempts() {
                const remaining = MAX_ATTEMPTS - attempts;
                if (remaining > 0 && attempts > 0) {
                    attemptsInfo.textContent = 'Осталось попыток: ' + remaining;
                } else if (remaining === 0) {
                    attemptsInfo.textContent = '❌ Доступ заблокирован. Обратитесь к администратору.';
                    btn.disabled = true;
                }
            }

            async function tryLogin() {
                const code = input.value.trim().toUpperCase();

                if (!code) {
                    showError('❌ Введите код доступа');
                    input.focus();
                    return;
                }

                if (attempts >= MAX_ATTEMPTS) {
                    showError('❌ Слишком много попыток. Обратитесь к администратору.');
                    return;
                }

                btn.disabled = true;
                btn.textContent = '⏳ Проверка...';

                const isValid = await isValidKey(code);

                btn.disabled = false;
                btn.textContent = 'Активировать доступ';

                if (isValid) {
                    localStorage.setItem(CODE_KEY, code);
                    localStorage.setItem(STORAGE_KEY, 'true');

                    const prefix = code.split('-')[0];
                    const message = prefix === 'MASTER' 
                        ? '✅ Вечный доступ активирован!' 
                        : '✅ Доступ на 24 часа активирован!';

                    error.textContent = message;
                    error.style.color = '#34c759';
                    error.style.background = 'rgba(52, 199, 89, 0.1)';
                    error.style.display = 'block';

                    setTimeout(() => {
                        const containerEl = document.getElementById('loginContainer');
                        if (containerEl) {
                            containerEl.style.transition = 'all 0.4s ease';
                            containerEl.style.opacity = '0';
                        }
                        setTimeout(() => location.reload(), 400);
                    }, 1000);
                } else {
                    attempts++;
                    updateAttempts();
                    showError('❌ Неверный код. Попробуйте снова.');
                    input.value = '';
                    input.focus();
                }
            }

            input.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    tryLogin();
                }
            });

            btn.addEventListener('click', tryLogin);

            setTimeout(() => input.focus(), 300);
            updateAttempts();
        }
    })();
    </script>

            box-shadow: 0 4px 15px rgba(175, 82, 222, 0.3);
        }

        .price-custom-input {
            margin-top: 8px;
            display: none;
        }

        .price-custom-input.show {
            display: block;
        }

        .price-custom-input input {
            width: 100%;
            padding: 12px;
            border: 2px solid rgba(102, 126, 234, 0.2);
            border-radius: 12px;
            font-size: 16px;
            outline: none;
            font-family: inherit;
            background: var(--ios-bg);
            color: var(--text-primary);
        }

        .duration-selector {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }

        .duration-btn {
            padding: 12px 8px;
            border: 2px solid rgba(102, 126, 234, 0.2);
            border-radius: 12px;
            background: var(--premium-card);
            font-size: 14px;
            cursor: pointer;
            font-weight: 600;
            text-align: center;
            transition: all 0.3s ease;
            color: var(--text-primary);
        }

        .duration-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: #667eea;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        @media (max-width: 480px) {
            .header h1 { font-size: 24px; }
            .header.compact h1 { font-size: 18px; }
            .header-stats { font-size: 11px; gap: 8px; }
            .header-stats span { padding: 2px 8px; }
            .schedule-table { font-size: 10px; min-width: 600px; }
            .schedule-table th .day-date { font-size: 14px; }
        }
    </style>
</head>
<body>

    <!-- ===== ОСНОВНОЙ КОНТЕНТ ПРИЛОЖЕНИЯ ===== -->
    <div id="appContent" style="display: none;">

        <div class="header" id="mainHeader">
            <div class="header-top">
                <h1 id="headerTitle">Курсанты</h1>
                <button class="theme-toggle" onclick="toggleTheme()" id="themeToggle">🌙</button>
            </div>
            <div class="header-stats" id="headerStats">
                <span id="counter">👥 0</span>
                <span id="todayLessons">📅 0</span>
                <span id="incomeStats">💰 0</span>

        </div>

        <div class="content">
            <div class="view active" id="studentsView">
                <div class="section">
                    <div class="card">
                        <div class="form-row">
                            <input type="text" id="inputName" placeholder="ФИО" autocomplete="off">
                        </div>
                        <div class="form-row">
                            <input type="text" id="inputGroup" placeholder="Группа" autocomplete="off" inputmode="numeric">
                        </div>
                        <div class="form-row">
                            <input type="tel" id="inputPhone" placeholder="Телефон" autocomplete="off">
                        </div>
                    </div>
                    <button class="btn-primary" onclick="addStudent()" style="margin-top: 12px;">Добавить</button>
                    <div class="button-group">
                        <button class="btn-export" onclick="exportData()">💾 Экспорт</button>
                        <button class="btn-csv" onclick="exportCSV()">📊 CSV</button>
                        <button class="btn-import" onclick="document.getElementById('fileInput').click()">📂 Импорт</button>
                        <button class="btn-backup" onclick="exportBackup()">💿 Бэкап</button>
                    </div>
                    <input type="file" id="fileInput" accept=".json" onchange="importData(event)">
                </div>

                <div class="section">
                    <div class="section-header">
                        <span>Все курсанты</span>
                        <button class="sort-toggle" id="sortToggle" onclick="toggleSort()">По имени</button>
                    </div>
                    <div class="search-box">
                        <input type="text" id="searchInput" placeholder="Поиск" oninput="renderList()">
                    </div>
                    <div id="studentsList" class="card"></div>
                </div>
            </div>

            <div class="view" id="scheduleView">
                <div class="schedule-nav">
                    <button class="schedule-nav-btn" onclick="changeWeek(-1)">‹</button>
                    <div class="schedule-nav-title">
                        <div class="schedule-nav-dates" id="scheduleDates"></div>
                        <button class="schedule-today-btn" onclick="goToCurrentWeek()">Текущая</button>
                    </div>
                    <button class="schedule-nav-btn" onclick="changeWeek(1)">›</button>
                </div>
                <div class="schedule-table-wrapper" id="scheduleTableWrapper">
                    <div class="swipe-indicator left" id="swipeIndicatorLeft">‹</div>
                    <div class="swipe-indicator right" id="swipeIndicatorRight">›</div>
                    <div id="scheduleTable"></div>
                </div>
                <div class="week-actions">
                    <button class="btn-clear-week" onclick="clearWeekLessons()">🗑️ Очистить неделю</button>
                </div>
            </div>
        </div>

        <div id="detailModal" class="detail-modal">
            <div class="detail-header">
                <button class="detail-back" onclick="closeDetailModal()">← Назад</button>
                <div class="detail-title">Контакт</div>
                <div style="width: 50px;"></div>
            </div>
            <div class="detail-content">
                <div class="detail-section">
                    <div class="detail-section-header">
                        <span>Занятия</span>
                        <button class="sort-toggle" onclick="openAddLessonFromDetail()">+ Добавить</button>
                    </div>
                    <div class="card" id="detailLessonsList"></div>
                </div>

                <div class="detail-section">
                    <div class="detail-section-header">Информация</div>
                    <div class="detail-card">
                        <div class="detail-row">
                            <div class="detail-label">ФИО</div>
                            <input class="detail-value" id="detailName" onchange="saveDetailField('name', this.value)">
                        </div>
                        <div class="detail-row">
                            <div class="detail-label">Группа</div>
                            <input class="detail-value" id="detailGroup" onchange="saveDetailField('group', this.value)">
                        </div>
                        <div class="detail-row">
                            <div class="detail-label">Телефон</div>
                            <input class="detail-value phone" id="detailPhone" onchange="saveDetailField('phone', this.value)">
                        </div>
                        <div class="detail-row">
                            <div class="detail-label">Дата добавления</div>
                            <div class="detail-value" id="detailDate"></div>
                        </div>
                        <div class="detail-row" id="detailReminderRow" style="display: none;">
                            <div class="detail-label">Напоминание</div>
                            <div class="reminder-badge" id="detailReminder"></div>
                        </div>
                    </div>
                </div>

                <div class="detail-section">
                    <div class="detail-section-header">Действия</div>
                    <div class="detail-actions">
                        <button class="detail-btn detail-btn-call" onclick="callStudent()">
                            <div class="detail-btn-icon">📞</div>
                            <div class="detail-btn-text">Позвонить</div>
                        </button>
                        <button class="detail-btn detail-btn-sms" onclick="smsStudent()">
                            <div class="detail-btn-icon">💬</div>
                            <div class="detail-btn-text">Написать SMS</div>
                        </button>
                        <button class="detail-btn detail-btn-copy" onclick="copyStudentPhone()">
                            <div class="detail-btn-icon">📋</div>
                            <div class="detail-btn-text">Копировать номер</div>
                        </button>
                        <button class="detail-btn detail-btn-notes" onclick="openNotesModal()">
                            <div class="detail-btn-icon">📝</div>
                            <div>
                                <div class="detail-btn-text">Заметки</div>
                                <div class="detail-notes-preview" id="detailNotesPreview"></div>
                            </div>
                        </button>
                        <button class="detail-btn detail-btn-reminder" onclick="openReminderModal()">
                            <div class="detail-btn-icon">⏰</div>
                            <div class="detail-btn-text">Напомнить о звонке</div>
                        </button>
                        <button class="detail-btn detail-btn-archive" onclick="toggleArchiveStudent()">
                            <div class="detail-btn-icon">📦</div>
                            <div class="detail-btn-text" id="archiveBtnText">Архивировать</div>
                        </button>
                        <button class="detail-btn detail-btn-delete" onclick="deleteCurrentStudent()">
                            <div class="detail-btn-icon">🗑️</div>
                            <div class="detail-btn-text" style="color: var(--ios-red);">Удалить курсанта</div>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div id="notesModal" class="modal">
            <div class="modal-content">
                <div class="modal-header">Заметки</div>
                <div class="modal-student-name" id="notesStudentName"></div>
                <div class="form-group">
                    <div class="template-buttons">
                        <button class="template-btn" onclick="insertTemplate('Позвонить после 18:00')">📞 Позвонить после 18</button>
                        <button class="template-btn" onclick="insertTemplate('Нужно оплатить')">💰 Нужно оплатить</button>
                        <button class="template-btn" onclick="insertTemplate('Перенос занятия')">📅 Перенос</button>
                        <button class="template-btn" onclick="insertTemplate('Подготовить документы')">📄 Документы</button>
                    </div>
                </div>
                <textarea id="notesInput" class="form-input" placeholder="Добавьте заметку..."></textarea>
                <button class="btn-primary" onclick="saveNotes()" style="margin-top: 12px;">Сохранить</button>
                <button class="btn-delete-note" id="deleteNoteBtn" onclick="deleteNote()" style="display: none;">Удалить заметку</button>
                <button class="btn-cancel" onclick="closeNotesModal()" style="margin-top: 10px;">Отмена</button>
            </div>
        </div>

        <div id="reminderModal" class="modal">
            <div class="modal-content">
                <div class="modal-header">⏰ Напомнить о звонке</div>
                <div class="modal-student-name" id="reminderStudentName"></div>
                <div class="reminder-options">
                    <button class="reminder-option" onclick="setReminder(5)">Через 5 минут</button>
                    <button class="reminder-option" onclick="setReminder(15)">Через 15 минут</button>
                    <button class="reminder-option" onclick="setReminder(30)">Через 30 минут</button>
                    <button class="reminder-option" onclick="setReminder(60)">Через 1 час</button>
                    <button class="reminder-option" onclick="setReminder(180)">Через 3 часа</button>
                    <button class="reminder-option" onclick="setReminder(1440)">Завтра</button>
                </div>
                <button class="btn-cancel" onclick="closeReminderModal()">Отмена</button>
            </div>
        </div>

        <div id="addLessonModal" class="modal">
            <div class="modal-content">
                <div class="modal-header">Добавить занятие</div>
                <div class="form-group">
                    <label class="form-label">Курсант</label>
                    <select id="lessonStudent" class="form-input"></select>
                </div>
                <div class="form-group">
                    <label class="form-label">Дата</label>
                    <input type="date" id="lessonDate" class="form-input">
                </div>
                <div class="form-group">
                    <label class="form-label">Время начала</label>
                    <select id="lessonStartTime" class="form-input"></select>
                </div>
                <div class="form-group">
                    <label class="form-label">Продолжительность (часов)</label>
                    <div class="duration-selector" id="durationSelector"></div>
                </div>
                <div class="form-group">
                    <label class="form-label">Тип занятия</label>
                    <div class="lesson-type-selector">
                        <button class="lesson-type-btn active" data-type="main" onclick="setLessonType('main', this)">📘 Основное</button>
                        <button class="lesson-type-btn additional" data-type="additional" onclick="setLessonType('additional', this)">➕ Дополнительное</button>
                    </div>
                </div>
                <div class="form-group" id="priceGroup" style="display: none;">
                    <label class="form-label">Цена</label>
                    <div class="price-selector">
                        <button class="price-btn" data-price="1500" onclick="selectPrice(1500, this)">1500 ₽</button>
                        <button class="price-btn" data-price="2000" onclick="selectPrice(2000, this)">2000 ₽</button>
                        <button class="price-btn" data-price="2500" onclick="selectPrice(2500, this)">2500 ₽</button>
                        <button class="price-btn" data-price="custom" onclick="selectPrice('custom', this)">Свой вариант</button>
                    </div>
                    <div class="price-custom-input" id="priceCustomInput">
                        <input type="number" id="customPrice" placeholder="Введите сумму" min="0">
                    </div>
                </div>
                <button class="btn-primary" onclick="saveLesson()" style="padding: 14px; font-size: 16px;">Добавить занятие</button>
                <button class="btn-cancel" onclick="closeAddLesson()">Отмена</button>
            </div>
        </div>

        <div class="action-sheet-overlay" id="actionSheet">
            <div class="action-sheet">
                <div class="action-sheet-title">
                    <strong id="actionSheetName"></strong>
                    <span id="actionSheetInfo"></span>
                </div>
                <div class="action-sheet-buttons">
                    <button class="action-sheet-btn call-btn" onclick="callFromSheet()">📞 Позвонить</button>
                    <button class="action-sheet-btn sms-btn" onclick="smsFromSheet()">💬 SMS</button>
                    <button class="action-sheet-btn delete-btn" onclick="deleteFromSheet()">🗑️ Удалить занятие</button>
                </div>
                <button class="action-sheet-cancel" onclick="closeActionSheet()">Отмена</button>
            </div>
        </div>

        <div class="undo-toast" id="undoToast">
            <span id="undoMessage">Удалено</span>
            <button class="undo-btn" onclick="undoLastAction()">Отменить</button>
        </div>

        <div class="tab-bar">
            <button class="tab-btn active" onclick="switchTab('students')">
                <div class="tab-icon">👥</div>
                <div>Курсанты</div>
            </button>
            <button class="tab-btn" onclick="switchTab('schedule')">
                <div class="tab-icon">📅</div>
                <div>График</div>
            </button>
        </div>

        <div class="toast" id="toast"></div>

        <script>
            // ===== ВСЯ ЛОГИКА ПРИЛОЖЕНИЯ =====
            const HOURS = [];
            for (let h = 8; h <= 22; h++) {
                HOURS.push(`${h.toString().padStart(2, '0')}:00`);
            }

            const START_TIMES = [];
            for (let h = 8; h <= 22; h++) {
                for (let m = 0; m < 60; m += 15) {
                    if (h === 22 && m > 0) break;
                    START_TIMES.push(`${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}`);
                }
            }

            const DURATIONS = [0.5, 1, 1.5, 2, 2.5, 3, 3.5, 4];
            const DAY_NAMES_SHORT = ['Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб', 'Вс'];

            let students = JSON.parse(localStorage.getItem('driving_students')) || [];
            let lessons = JSON.parse(localStorage.getItem('driving_lessons')) || [];
            let currentStudentId = null;
            let sortByDate = false;
            let weekOffset = 0;
            let currentLessonType = 'main';
            let selectedStartTime = null;
            let selectedDuration = null;
            let selectedPrice = null;
            let toastTimeout = null;
            let actionSheetLesson = null;
            let darkTheme = localStorage.getItem('driving_theme') === 'dark';
            let lastAction = null;
            let undoTimeout = null;
            let scheduleSearchTerm = '';

            let swipeStartX = 0;
            let swipeStartY = 0;
            let swipeStartTime = 0;
            let isSwiping = false;

            function initApp() {
                if ('Notification' in window && Notification.permission === 'default') {
                    Notification.requestPermission();
                }

                if (darkTheme) {
                    document.documentElement.setAttribute('data-theme', 'dark');
                    document.getElementById('themeToggle').textContent = '☀️';
                }

                renderList();
                updateHeaderStats();
                checkReminders();
                setupWeekSwipe();
                
                setInterval(checkReminders, 30000);
                setInterval(() => {
                    if (document.querySelector('#studentsView.active')) renderList();
                    if (document.querySelector('#scheduleView.active')) renderSchedule();
                    updateHeaderStats();
                }, 60000);

                document.querySelectorAll('.modal').forEach(modal => {
                    modal.addEventListener('click', function(e) {
                        if (e.target === this) {
                            this.classList.remove('show');
                        }
                    });
                });

                document.querySelectorAll('.action-sheet-overlay').forEach(sheet => {
                    sheet.addEventListener('click', function(e) {
                        if (e.target === this) {
                            this.classList.remove('show');
                        }
                    });
                });
            }

            function toggleTheme() {
                darkTheme = !darkTheme;
                localStorage.setItem('driving_theme', darkTheme ? 'dark' : 'light');
                document.documentElement.setAttribute('data-theme', darkTheme ? 'dark' : 'light');
                document.getElementById('themeToggle').textContent = darkTheme ? '☀️' : '🌙';
            }

            function toLocalDateString(date) {
                const year = date.getFullYear();
                const month = String(date.getMonth() + 1).padStart(2, '0');
                const day = String(date.getDate()).padStart(2, '0');
                return `${year}-${month}-${day}`;
            }

            function formatDate(isoString) {
                if (!isoString) return '—';
                const date = new Date(isoString);
                return date.toLocaleDateString('ru-RU', { day: 'numeric', month: 'short', year: 'numeric' });
            }

            function formatDateLesson(dateStr) {
                const date = new Date(dateStr + 'T00:00:00');
                return date.toLocaleDateString('ru-RU', { day: 'numeric', month: 'long', year: 'numeric', weekday: 'short' });
            }

            function formatReminderTime(timestamp) {
                const now = Date.now();
                const diff = timestamp - now;
                if (diff <= 0) return 'Сейчас';
                const minutes = Math.floor(diff / 60000);
                if (minutes < 60) return `через ${minutes} мин`;
                const hours = Math.floor(minutes / 60);
                if (hours < 24) return `через ${hours} ч`;
                const days = Math.floor(hours / 24);
                return `через ${days} дн`;
            }

            function timeToMinutes(timeStr) {
                const [h, m] = timeStr.split(':').map(Number);
                return h * 60 + m;
            }

            function minutesToTime(minutes) {
                const h = Math.floor(minutes / 60);
                const m = minutes % 60;
                return `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}`;
            }

            function formatDuration(hours) {
                return `${hours} ч`;
            }

            function saveData() {
                localStorage.setItem('driving_students', JSON.stringify(students));
                localStorage.setItem('driving_lessons', JSON.stringify(lessons));
                updateHeaderStats();
            }

            function updateHeaderStats() {
                const activeCount = students.filter(s => !s.archived).length;
                const now = new Date();
                const todayStr = toLocalDateString(now);
                const todayLessonsCount = lessons.filter(l => l.date === todayStr).length;
                const totalIncome = lessons
                    .filter(l => l.type === 'additional' && l.price)
                    .reduce((sum, l) => sum + l.price, 0);
                
                document.getElementById('counter').textContent = `👥 ${activeCount}`;
                document.getElementById('todayLessons').textContent = `📅 ${todayLessonsCount}`;
                document.getElementById('incomeStats').textContent = `💰 ${totalIncome.toLocaleString()}`;
            }

            function saveAction(action, data) {
                lastAction = { action, data };
                document.getElementById('undoToast').classList.add('show');
                document.getElementById('undoMessage').textContent = action === 'delete' ? 'Курсант удален' : 'Занятие удалено';
                
                if (undoTimeout) clearTimeout(undoTimeout);
                undoTimeout = setTimeout(() => {
                    document.getElementById('undoToast').classList.remove('show');
                    lastAction = null;
                }, 5000);
            }

            function undoLastAction() {
                if (!lastAction) return;
                
                if (lastAction.action === 'delete' && lastAction.data) {
                    students.push(lastAction.data);
                    saveData();
                    renderList();
                    showToast('Отменено');
                } else if (lastAction.action === 'deleteLesson' && lastAction.data) {
                    lessons.push(lastAction.data);
                    saveData();
                    renderSchedule();
                    if (currentStudentId) renderDetailLessons();
                    showToast('Отменено');
                }
                
                document.getElementById('undoToast').classList.remove('show');
                lastAction = null;
                if (undoTimeout) clearTimeout(undoTimeout);
            }

            function showToast(message) {
                const toast = document.getElementById('toast');
                if (toastTimeout) {
                    clearTimeout(toastTimeout);
                    toast.classList.remove('show');
                }
                
                toast.textContent = message;
                toast.classList.remove('hide');
                toast.classList.add('show');
                
                toastTimeout = setTimeout(() => {
                    toast.classList.add('hide');
                    setTimeout(() => {
                        toast.classList.remove('show', 'hide');
                    }, 300);
                    toastTimeout = null;
                }, 2500);
            }

            function addStudent() {
                const name = document.getElementById('inputName').value.trim();
                const group = document.getElementById('inputGroup').value.trim();
                const phone = document.getElementById('inputPhone').value.trim();

                if (!name || !phone) {
                    showToast('Введите ФИО и номер телефона!');
                    return;
                }

                students.push({
                    id: Date.now(),
                    name,
                    group,
                    phone,
                    notes: '',
                    reminder: null,
                    archived: false,
                    createdAt: new Date().toISOString()
                });

                saveData();
                renderList();
                
                document.getElementById('inputName').value = '';
                document.getElementById('inputGroup').value = '';
                document.getElementById('inputPhone').value = '';
                showToast('Курсант добавлен');
            }

            function deleteStudent(id) {
                const student = students.find(s => s.id === id);
                if (!student) return;
                
                if (confirm(`Удалить ${student.name} и все его занятия?`)) {
                    saveAction('delete', { ...student });
                    students = students.filter(s => s.id !== id);
                    lessons = lessons.filter(l => l.studentId !== id);
                    saveData();
                    closeDetailModal();
                    renderList();
                    showToast('Курсант удален');
                }
            }

            function deleteCurrentStudent() {
                if (currentStudentId) {
                    deleteStudent(currentStudentId);
                }
            }

            function toggleArchiveStudent() {
                const student = students.find(s => s.id === currentStudentId);
                if (!student) return;
                
                student.archived = !student.archived;
                saveData();
                document.getElementById('archiveBtnText').textContent = student.archived ? 'Разархивировать' : 'Архивировать';
                renderList();
                showToast(student.archived ? 'Архивирован' : 'Разархивирован');
            }

            function saveDetailField(field, value) {
                const student = students.find(s => s.id === currentStudentId);
                if (student) {
                    student[field] = value;
                    saveData();
                    renderList();
                }
            }

            function copyPhone(phone) {
                const cleanPhone = phone.replace(/[\s\-\(\)]/g, '');
                navigator.clipboard.writeText(cleanPhone).then(() => {
                    showToast('Номер скопирован!');
                }).catch(() => {
                    const textArea = document.createElement("textarea");
                    textArea.value = cleanPhone;
                    document.body.appendChild(textArea);
                    textArea.select();
                    document.execCommand("copy");
                    document.body.removeChild(textArea);
                    showToast('Номер скопирован!');
                });
            }

            function copyStudentPhone() {
                const student = students.find(s => s.id === currentStudentId);
                if (student) copyPhone(student.phone);
            }

            function callStudent() {
                const student = students.find(s => s.id === currentStudentId);
                if (!student) return;
                const telLink = student.phone.replace(/[^\d+]/g, '');
                window.location.href = `tel:${telLink}`;
            }

            function smsStudent() {
                const student = students.find(s => s.id === currentStudentId);
                if (!student) return;
                let cleanPhone = student.phone.replace(/[^\d+]/g, '');
                if (cleanPhone.startsWith('+')) cleanPhone = cleanPhone.substring(1);
                if (cleanPhone.startsWith('8') && cleanPhone.length === 11) {
                    cleanPhone = '7' + cleanPhone.substring(1);
                }
                window.location.href = `sms:+${cleanPhone}`;
            }

            function openNotesModal() {

            function checkReminders() {
                const now = Date.now();

                students.forEach(student => {

            function renderList() {
                const listContainer = document.getElementById('studentsList');
                const searchTerm = document.getElementById('searchInput').value.toLowerCase();

                let filtered = students.filter(s => 
                    s.name.toLowerCase().includes(searchTerm) || 
                    (s.group && s.group.toLowerCase().includes(searchTerm)) ||
                    (s.notes && s.notes.toLowerCase().includes(searchTerm)) ||
                    s.phone.includes(searchTerm)
                );

                filtered.sort((a, b) => {
                    if (a.archived && !b.archived) return 1;
                    if (!a.archived && b.archived) return -1;
                    if (sortByDate) {
                        return new Date(b.createdAt) - new Date(a.createdAt);
                    }
                    return a.name.localeCompare(b.name, 'ru');
                });

                if (filtered.length === 0) {
                    listContainer.innerHTML = `

                            <div class="student-list-info">

                                    ${hasReminder ? ' ⏰' : ''}

                                <div class="student-list-details">
                                    ${s.group ? `Группа: ${s.group}` : ''} ${s.group && s.phone ? '•' : ''} ${s.phone}

            function saveLesson() {
                const date = document.getElementById('lessonDate').value;
                const studentSelect = document.getElementById('lessonStudent');
                const studentId = parseInt(studentSelect.value);
                const startTime = document.getElementById('lessonStartTime').value;

                if (!date) {
                    showToast('📅 Выберите дату');
                    return;
                }
                if (!startTime) {
                    showToast('🕐 Выберите время начала');
                    document.getElementById('lessonStartTime').focus();
                    return;
                }
                if (!selectedDuration) {
                    showToast('⏱ Выберите продолжительность');
                    return;
                }
                if (!studentId || isNaN(studentId)) {
                    showToast('👤 Выберите курсанта из списка');
                    studentSelect.focus();
                    return;
                }

                if (currentLessonType === 'additional' && !selectedPrice) {
                    showToast('💰 Выберите цену');
                    return;
                }

                const startMinutes = timeToMinutes(startTime);
                const endMinutes = startMinutes + Math.round(selectedDuration * 60);
                
                const conflictingLessons = lessons.filter(l => {
                    if (l.date !== date) return false;
                    const lStart = timeToMinutes(l.startTime);
                    const lEnd = lStart + Math.round(l.duration * 60);
                    return (startMinutes < lEnd && endMinutes > lStart);
                });

                if (conflictingLessons.length > 0) {
                    const student = students.find(s => s.id === conflictingLessons[0].studentId);
                    if (!confirm(`В это время уже есть занятие (${student ? student.name : 'курсант'}). Заменить?`)) {
                        return;
                    }
                    lessons = lessons.filter(l => !conflictingLessons.includes(l));
                }

                const finalPrice = currentLessonType === 'additional' && selectedPrice === 'custom' 
                    ? parseInt(document.getElementById('customPrice').value) 
                    : selectedPrice;

                if (currentLessonType === 'additional' && (!finalPrice || finalPrice <= 0)) {
                    showToast('💰 Введите корректную сумму');
                    return;
                }

                lessons.push({
                    id: Date.now(),
                    date,
                    startTime,
                    duration: selectedDuration,
                    studentId,
                    type: currentLessonType,
                    price: currentLessonType === 'additional' ? finalPrice : null
                });

                saveData();
                closeAddLesson();
                renderSchedule();
                renderList();
                
                if (currentStudentId) {
                    renderDetailLessons();
                }
                
                showToast('✅ Занятие добавлено!');
            }

            function getWeekDates(offset) {
                const now = new Date();
                const dayOfWeek = now.getDay();
                const mondayOffset = dayOfWeek === 0 ? -6 : 1 - dayOfWeek;
                const monday = new Date(now);
                monday.setDate(now.getDate() + mondayOffset + (offset * 7));
                monday.setHours(0, 0, 0, 0);
                
                const dates = [];
                for (let i = 0; i < 7; i++) {
                    const date = new Date(monday);
                    date.setDate(monday.getDate() + i);
                    dates.push(date);
                }
                return dates;
            }

            function changeWeek(direction) {
                weekOffset += direction;
                renderSchedule();
            }

            function goToCurrentWeek() {
                weekOffset = 0;
                renderSchedule();
            }

            function clearWeekLessons() {
                const dates = getWeekDates(weekOffset);
                const startDate = dates[0];
                const endDate = dates[6];
                
                const weekLessons = lessons.filter(l => {
                    const lessonDate = new Date(l.date + 'T00:00:00');
                    return lessonDate >= startDate && lessonDate <= endDate;
                });
                
                if (weekLessons.length === 0) {
                    showToast('Нет занятий для удаления');
                    return;
                }
                
                if (confirm(`Удалить все ${weekLessons.length} занятий за неделю ${startDate.toLocaleDateString('ru-RU', {day: 'numeric', month: 'short'})} - ${endDate.toLocaleDateString('ru-RU', {day: 'numeric', month: 'short', year: 'numeric'})}?`)) {
                    lessons = lessons.filter(l => {
                        const lessonDate = new Date(l.date + 'T00:00:00');
                        return lessonDate < startDate || lessonDate > endDate;
                    });
                    saveData();
                    renderSchedule();
                    renderList();
                    showToast('Все занятия за неделю удалены');
                }
            }

            function renderSchedule() {
                const dates = getWeekDates(weekOffset);
                const today = new Date();
                today.setHours(0, 0, 0, 0);
                
                const startDate = dates[0];
                const endDate = dates[6];
                
                const headerText = `${startDate.toLocaleDateString('ru-RU', { day: 'numeric', month: 'short' })} — ${endDate.toLocaleDateString('ru-RU', { day: 'numeric', month: 'short', year: 'numeric' })}`;
                document.getElementById('scheduleDates').textContent = headerText;
                
                const weekLessons = lessons.filter(l => {
                    const lessonDate = new Date(l.date + 'T00:00:00');
                    return lessonDate >= startDate && lessonDate <= endDate;
                });

                let html = '<table class="schedule-table"><thead><tr><th class="time-cell">Время</th>';
                dates.forEach((date, i) => {
                    const isToday = date.getTime() === today.getTime();
                    html += `<th class="${isToday ? 'today' : ''}">
                        <span class="day-name">${DAY_NAMES_SHORT[i]}</span>
                        <span class="day-date">${date.getDate()}</span>
                    </th>`;
                });
                html += '</tr></thead><tbody>';

                const occupiedCells = new Set();

                HOURS.forEach((hour) => {
                    const hourMinutes = timeToMinutes(hour);
                    html += `<tr><td class="time-cell">${hour}</td>`;
                    
                    dates.forEach((date) => {
                        const dateStr = toLocalDateString(date);
                        const cellKey = `${dateStr}-${hour}`;
                        
                        if (occupiedCells.has(cellKey)) {
                            return;
                        }
                        
                        const lesson = weekLessons.find(l => {
                            if (l.date !== dateStr) return false;
                            const lessonStart = timeToMinutes(l.startTime);
                            return lessonStart >= hourMinutes && lessonStart < hourMinutes + 60;
                        });
                        
                        if (lesson) {
                            const student = students.find(s => s.id === lesson.studentId);
                            if (student) {
                                const lessonStart = timeToMinutes(lesson.startTime);
                                const lessonEnd = lessonStart + Math.round(lesson.duration * 60);
                                
                                const startHour = Math.floor(lessonStart / 60);
                                let endHour = Math.ceil(lessonEnd / 60);
                                
                                for (let h = startHour + 1; h < endHour; h++) {
                                    const hMinutes = h * 60;
                                    const hasOtherLesson = weekLessons.some(other => {
                                        if (other.id === lesson.id) return false;
                                        if (other.date !== dateStr) return false;
                                        const otherStart = timeToMinutes(other.startTime);
                                        return otherStart >= hMinutes && otherStart < hMinutes + 60;
                                    });
                                    if (hasOtherLesson) {
                                        endHour = h;
                                        break;
                                    }
                                }
                                
                                const rowspan = Math.max(1, endHour - startHour);
                                const endTimeStr = minutesToTime(lessonEnd);
                                
                                let className;
                                if (lesson.type === 'main') {
                                    className = 'main-lesson';
                                } else {
                                    className = 'additional-lesson';
                                }
                                
                                html += `<td class="schedule-cell" rowspan="${rowspan}" onclick="handleCellClick('${dateStr}', '${lesson.startTime}', ${lesson.id})">`;
                                html += `<div class="schedule-cell-content ${className}">`;
                                html += `<div class="student-name">${student.name}</div>`;
                                html += `<div class="student-group">(${student.group || '000'})</div>`;
                                html += `<div class="lesson-duration">${formatDuration(lesson.duration)} (${lesson.startTime}-${endTimeStr})</div>`;
                                if (lesson.type === 'additional' && lesson.price) {
                                    html += `<div class="lesson-price">${lesson.price} ₽</div>`;
                                }
                                html += '</div></td>';
                                
                                for (let h = startHour; h < startHour + rowspan; h++) {
                                    occupiedCells.add(`${dateStr}-${minutesToTime(h * 60)}`);
                                }
                            }
                        } else {
                            html += `<td class="schedule-cell" onclick="handleCellClick('${dateStr}', '${hour}', null)"></td>`;
                        }
                    });
                    
                    html += '</tr>';
                });

                html += '</tbody></table>';
                
                document.getElementById('scheduleTable').innerHTML = html;
            }

            function handleCellClick(dateStr, hour, lessonId) {
                if (lessonId) {
                    const lesson = lessons.find(l => l.id === lessonId);
                    if (!lesson) return;
                    
                    const student = students.find(s => s.id === lesson.studentId);
                    
                    actionSheetLesson = { lesson, dateStr, hour };
                    
                    document.getElementById('actionSheetName').textContent = student ? student.name : 'Неизвестно';
                    
                    const endTime = minutesToTime(timeToMinutes(hour) + Math.round(lesson.duration * 60));
                    let infoText = `${hour}-${endTime} (${formatDuration(lesson.duration)})`;
                    if (lesson.type === 'main') infoText += ' • Основное';
                    else infoText += ' • Дополнительное' + (lesson.price ? ` • ${lesson.price} ₽` : '');
                    
                    document.getElementById('actionSheetInfo').textContent = infoText;
                    document.getElementById('actionSheet').classList.add('show');
                } else {
                    openAddLesson(dateStr, hour);
                }
            }

            function exportData() {
                const data = { students, lessons };
                const dataStr = JSON.stringify(data, null, 2);
                const blob = new Blob([dataStr], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const date = new Date().toISOString().split('T')[0];
                const a = document.createElement('a');
                a.href = url;
                a.download = `данные_${date}.json`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                showToast('Данные экспортированы!');
            }

            function exportCSV() {
                let csv = 'ФИО,Группа,Телефон,Дата добавления,Заметки,Архив,Кол-во занятий\n';
                students.forEach(s => {
                    const lessonsCount = lessons.filter(l => l.studentId === s.id).length;
                    csv += `"${s.name}","${s.group || ''}","${s.phone}","${formatDate(s.createdAt)}","${(s.notes || '').replace(/"/g, '""')}","${s.archived ? 'Да' : 'Нет'}","${lessonsCount}"\n`;
                });
                
                const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                const date = new Date().toISOString().split('T')[0];
                const a = document.createElement('a');
                a.href = url;
                a.download = `курсанты_${date}.csv`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                showToast('CSV экспортирован!');
            }

            function exportBackup() {
                const data = { 
                    students, 
                    lessons,
                    backupDate: new Date().toISOString(),
                    version: '1.0'
                };
                const dataStr = JSON.stringify(data, null, 2);
                const blob = new Blob([dataStr], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const date = new Date().toISOString().split('T')[0];
                const a = document.createElement('a');
                a.href = url;
                a.download = `backup_${date}.json`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                showToast('Бэкап создан!');
            }

            function importData(event) {
                const file = event.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = function(e) {
                    try {
                        const data = JSON.parse(e.target.result);
                        if (data.students && Array.isArray(data.students)) {
                            if (confirm('Импортировать данные? Текущие данные будут заменены.')) {
                                students = data.students;
                                lessons = data.lessons || [];
                                saveData();
                                renderList();
                                renderSchedule();
                                showToast('Данные импортированы!');
                            }
                        }
                    } catch (error) {
                        showToast('Ошибка: ' + error.message);
                    }
                };
                reader.readAsText(file);
                event.target.value = '';
            }

            function switchTab(tab) {
                closeDetailModal();
                
                document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                
                const header = document.getElementById('mainHeader');
                const headerStats = document.getElementById('headerStats');
                
                if (tab === 'students') {
                    document.getElementById('studentsView').classList.add('active');
                    document.querySelectorAll('.tab-btn')[0].classList.add('active');
                    document.getElementById('headerTitle').textContent = 'Курсанты';
                    headerStats.style.display = 'flex';
                    header.classList.remove('compact');
                    renderList();
                } else if (tab === 'schedule') {
                    document.getElementById('scheduleView').classList.add('active');
                    document.querySelectorAll('.tab-btn')[1].classList.add('active');
                    headerStats.style.display = 'none';
                    header.classList.add('compact');
                    renderSchedule();
                }
            }

            function setupWeekSwipe() {
                const wrapper = document.getElementById('scheduleTableWrapper');
                const indicatorLeft = document.getElementById('swipeIndicatorLeft');
                const indicatorRight = document.getElementById('swipeIndicatorRight');
                
                wrapper.addEventListener('touchstart', function(e) {
                    swipeStartX = e.touches[0].clientX;
                    swipeStartY = e.touches[0].clientY;
                    swipeStartTime = Date.now();
                    isSwiping = true;
                }, { passive: true });

                wrapper.addEventListener('touchmove', function(e) {
                    if (!isSwiping) return;
                    
                    const touchX = e.touches[0].clientX;
                    const diffX = touchX - swipeStartX;
                    
                    const scrollLeft = wrapper.scrollLeft;
                    const maxScrollLeft = wrapper.scrollWidth - wrapper.clientWidth;
                    
                    if (scrollLeft < 10 && diffX > 0) {
                        indicatorLeft.classList.add('visible');
                    } else if (scrollLeft >= maxScrollLeft - 10 && diffX < 0) {
                        indicatorRight.classList.add('visible');
                    } else {
                        indicatorLeft.classList.remove('visible');
                        indicatorRight.classList.remove('visible');
                    }
                }, { passive: true });

                wrapper.addEventListener('touchend', function(e) {
                    if (!isSwiping) return;
                    isSwiping = false;
                    
                    indicatorLeft.classList.remove('visible');
                    indicatorRight.classList.remove('visible');
                    
                    const touchEndX = e.changedTouches[0].clientX;
                    const touchEndY = e.changedTouches[0].clientY;
                    const diffX = touchEndX - swipeStartX;
                    const diffY = touchEndY - swipeStartY;
                    const elapsed = Date.now() - swipeStartTime;
                    
                    const scrollLeft = wrapper.scrollLeft;
                    const maxScrollLeft = wrapper.scrollWidth - wrapper.clientWidth;
                    
                    const atLeftEdge = scrollLeft < 10;
                    const atRightEdge = scrollLeft >= maxScrollLeft - 10;
                    
                    if (Math.abs(diffX) > 50 && Math.abs(diffX) > Math.abs(diffY) * 1.5 && elapsed < 500) {
                        if (diffX > 0 && atLeftEdge) {
                            changeWeek(-1);
                            showToast('← Предыдущая неделя');
                        } else if (diffX < 0 && atRightEdge) {
                            changeWeek(1);
                            showToast('Следующая неделя →');
                        }
                    }
                }, { passive: true });
            }
        </script>
    </div>
    <!-- ===== КОНЕЦ ОСНОВНОГО КОНТЕНТА ===== -->
<!-- Кнопка сброса доступа -->
<div style="position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); z-index: 9999; opacity: 0.5;">
    <button onclick="resetAccess()" style="padding: 10px 24px; background: #ff3b30; color: white; border: none; border-radius: 12px; font-size: 14px; font-weight: 600; cursor: pointer; box-shadow: 0 4px 15px rgba(255,59,48,0.3);">
        🚪 Сбросить доступ
    </button>
</div>

<script>
function resetAccess() {
    if (confirm('Сбросить авторизацию? Будет запрошен ключ доступа.')) {
        localStorage.clear();
        location.reload();
    }
}
</script>
